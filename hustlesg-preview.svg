<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 384" width="800" height="384">
  <defs>
    <!-- Warm cream surface matching oklch(97% 0.012 85) -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f3ee"/>
      <stop offset="100%" stop-color="#f2ede6"/>
    </linearGradient>
    <!-- Rose glow matching oklch(68% 0.18 340) -->
    <radialGradient id="roseGlow" cx="30%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#d4566b" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#d4566b" stop-opacity="0"/>
    </radialGradient>
    <!-- Rose accent gradient -->
    <linearGradient id="roseFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d4566b"/>
      <stop offset="100%" stop-color="#c94d6a"/>
    </linearGradient>
    <!-- Trust blue matching oklch(55% 0.16 240) -->
    <linearGradient id="trustBlue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2f67c2"/>
      <stop offset="100%" stop-color="#3570d0"/>
    </linearGradient>
  </defs>

  <!-- Cream background -->
  <rect width="800" height="384" fill="url(#bg)"/>
  <!-- Rose glow -->
  <ellipse cx="240" cy="192" rx="380" ry="250" fill="url(#roseGlow)"/>
  <!-- Subtle grid -->
  <pattern id="grid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
    <line x1="0" y1="0" x2="0" y2="32" stroke="oklch(86% 0.012 85)" stroke-width="0.5" opacity="0.5"/>
    <line x1="0" y1="0" x2="32" y2="0" stroke="oklch(86% 0.012 85)" stroke-width="0.5" opacity="0.5"/>
  </pattern>
  <rect width="800" height="384" fill="url(#grid)" opacity="0.4"/>

  <!-- ── Left: Hero branding ── -->

  <!-- PRODUCT badge -->
  <rect x="52" y="40" width="72" height="22" rx="11"
        fill="rgba(212,86,107,0.12)" stroke="rgba(212,86,107,0.35)" stroke-width="1"/>
  <text x="88" y="55" font-family="'JetBrains Mono',monospace" font-size="9" font-weight="700"
        fill="#c94d6a" text-anchor="middle" letter-spacing="1">PRODUCT</text>

  <!-- Wordmark: HUSTLE in dark ink -->
  <text x="52" y="134" font-family="'Bricolage Grotesque','Inter',sans-serif" font-size="58" font-weight="900"
        fill="#1a1f2e" letter-spacing="-2">HUSTLE</text>

  <!-- SG pill in rose -->
  <rect x="54" y="146" width="58" height="30" rx="15" fill="url(#roseFill)"/>
  <text x="83" y="167" font-family="'Bricolage Grotesque','Inter',sans-serif" font-size="18" font-weight="900"
        fill="white" text-anchor="middle" letter-spacing="1">SG</text>

  <!-- Tagline — "actually" in rose, rest in dark -->
  <text x="52" y="216" font-family="'Bricolage Grotesque','Inter',sans-serif" font-size="15" fill="#1a1f2e">
    Your side gig work,
  </text>
  <text x="52" y="237" font-family="'Bricolage Grotesque','Inter',sans-serif" font-size="15" fill="#1a1f2e">
    <tspan fill="#d4566b" font-weight="700" font-style="italic">actually</tspan>
    <tspan font-weight="700"> verified.</tspan>
  </text>

  <!-- Singpass trust badge -->
  <rect x="52" y="254" width="126" height="24" rx="12"
        fill="rgba(47,103,194,0.1)" stroke="rgba(47,103,194,0.35)" stroke-width="1"/>
  <circle cx="70" cy="266" r="7" fill="url(#trustBlue)"/>
  <text x="70" y="270" font-size="9" fill="white" text-anchor="middle" font-weight="900">S</text>
  <text x="131" y="270" font-family="monospace" font-size="9" font-weight="700"
        fill="#2f67c2" text-anchor="middle" letter-spacing="0.5">SINGPASS AUTH</text>

  <!-- Gig chips -->
  <g transform="translate(52, 292)">
    <rect x="0"  y="0" width="56" height="20" rx="10" fill="rgba(212,86,107,0.1)" stroke="rgba(212,86,107,0.3)" stroke-width="1"/>
    <text x="28" y="14" font-family="monospace" font-size="8" font-weight="700" fill="#c94d6a" text-anchor="middle">DESIGN</text>
    <rect x="62" y="0" width="56" height="20" rx="10" fill="rgba(212,86,107,0.1)" stroke="rgba(212,86,107,0.3)" stroke-width="1"/>
    <text x="90" y="14" font-family="monospace" font-size="8" font-weight="700" fill="#c94d6a" text-anchor="middle">TUITION</text>
    <rect x="124" y="0" width="52" height="20" rx="10" fill="rgba(212,86,107,0.1)" stroke="rgba(212,86,107,0.3)" stroke-width="1"/>
    <text x="150" y="14" font-family="monospace" font-size="8" font-weight="700" fill="#c94d6a" text-anchor="middle">EVENTS</text>
  </g>

  <!-- ── Right: UI cards in cream/white ── -->

  <!-- Gig card 1 -->
  <rect x="370" y="32" width="398" height="148" rx="18"
        fill="white" stroke="rgba(212,86,107,0.15)" stroke-width="1"
        style="filter:drop-shadow(0 4px 20px rgba(26,31,46,0.08))"/>
  <!-- Card header bar -->
  <rect x="370" y="32" width="398" height="8" rx="9" fill="url(#roseFill)"/>
  <rect x="370" y="36" width="398" height="4" fill="url(#roseFill)"/>
  <!-- Category label -->
  <text x="394" y="62" font-family="monospace" font-size="9" font-weight="700"
        fill="#d4566b" letter-spacing="1.5">UI / UX DESIGN</text>
  <!-- Job title -->
  <text x="394" y="82" font-family="'Inter',sans-serif" font-size="14" font-weight="700"
        fill="#1a1f2e">Brand Identity for F&amp;B Startup</text>
  <!-- Company / location -->
  <text x="394" y="99" font-family="'Inter',sans-serif" font-size="11" fill="#5a5f72">
    Kopitiam Co. · Bedok · 2h ago
  </text>
  <!-- Rate -->
  <text x="394" y="124" font-family="'JetBrains Mono',monospace" font-size="15" font-weight="700" fill="#1a1f2e">S$8,400</text>
  <text x="452" y="124" font-family="'Inter',sans-serif" font-size="11" fill="#8a8fa3"> fixed</text>
  <!-- Verified badge -->
  <rect x="570" y="110" width="68" height="22" rx="11" fill="rgba(47,103,194,0.1)" stroke="rgba(47,103,194,0.3)" stroke-width="1"/>
  <text x="605" y="125" font-family="monospace" font-size="8" font-weight="700" fill="#2f67c2" text-anchor="middle" letter-spacing="0.5">✓ VERIFIED</text>
  <!-- Tags -->
  <rect x="394" y="136" width="46" height="18" rx="9" fill="rgba(212,86,107,0.08)" stroke="rgba(212,86,107,0.2)" stroke-width="1"/>
  <text x="417" y="149" font-family="monospace" font-size="8" fill="#c94d6a" text-anchor="middle">FIGMA</text>
  <rect x="448" y="136" width="48" height="18" rx="9" fill="rgba(212,86,107,0.08)" stroke="rgba(212,86,107,0.2)" stroke-width="1"/>
  <text x="472" y="149" font-family="monospace" font-size="8" fill="#c94d6a" text-anchor="middle">BRAND</text>
  <rect x="504" y="136" width="56" height="18" rx="9" fill="rgba(212,86,107,0.08)" stroke="rgba(212,86,107,0.2)" stroke-width="1"/>
  <text x="532" y="149" font-family="monospace" font-size="8" fill="#c94d6a" text-anchor="middle">REMOTE</text>

  <!-- Gig card 2 (offset) -->
  <rect x="400" y="196" width="368" height="104" rx="18"
        fill="white" stroke="rgba(47,103,194,0.12)" stroke-width="1"
        style="filter:drop-shadow(0 4px 16px rgba(26,31,46,0.06))"/>
  <rect x="400" y="196" width="368" height="8" rx="9" fill="url(#trustBlue)"/>
  <rect x="400" y="200" width="368" height="4" fill="url(#trustBlue)"/>
  <text x="424" y="224" font-family="monospace" font-size="9" font-weight="700"
        fill="#2f67c2" letter-spacing="1.5">TUITION · MATHEMATICS</text>
  <text x="424" y="244" font-family="'Inter',sans-serif" font-size="13" font-weight="700"
        fill="#1a1f2e">O-Level Math &amp; A-Level H2</text>
  <text x="424" y="261" font-family="'Inter',sans-serif" font-size="11" fill="#5a5f72">NUS grad · Queenstown · 5h ago</text>
  <text x="424" y="283" font-family="'JetBrains Mono',monospace" font-size="14" font-weight="700" fill="#1a1f2e">S$65</text>
  <text x="459" y="283" font-family="'Inter',sans-serif" font-size="11" fill="#8a8fa3"> / hr</text>
  <rect x="566" y="270" width="86" height="22" rx="11" fill="rgba(47,103,194,0.1)" stroke="rgba(47,103,194,0.3)" stroke-width="1"/>
  <text x="609" y="285" font-family="monospace" font-size="8" font-weight="700" fill="#2f67c2" text-anchor="middle" letter-spacing="0.3">✓ NUS CERT</text>

  <!-- AI match strip -->
  <rect x="370" y="316" width="398" height="44" rx="14"
        fill="rgba(26,31,46,0.04)" stroke="rgba(212,86,107,0.15)" stroke-width="1"/>
  <text x="394" y="333" font-family="monospace" font-size="8" fill="#8a8fa3" letter-spacing="1">AI_MATCH · 1536-D COSINE</text>
  <rect x="394" y="340" width="280" height="5" rx="2.5" fill="rgba(212,86,107,0.12)"/>
  <rect x="394" y="340" width="238" height="5" rx="2.5" fill="url(#roseFill)"/>
  <text x="684" y="345" font-family="monospace" font-size="9" font-weight="700" fill="#d4566b">85%</text>

  <!-- Bottom right edge fade -->
  <linearGradient id="rightFade" x1="0" y1="0" x2="1" y2="0">
    <stop offset="75%" stop-color="#f2ede6" stop-opacity="0"/>
    <stop offset="100%" stop-color="#f2ede6" stop-opacity="0.7"/>
  </linearGradient>
  <rect width="800" height="384" fill="url(#rightFade)"/>
</svg>
