  <!-- Footer -->
  <text x="48" y="352" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9" letter-spacing="2" fill="#6a7a98">STT → LLM_TRANSLATE → VOXCPM_TTS</text>
