<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 384" width="800" height="384">
  <defs>
    <linearGradient id="cbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1629"/>
      <stop offset="55%" stop-color="#1a1408"/>
      <stop offset="100%" stop-color="#2a1a00"/>
    </linearGradient>
    <radialGradient id="cglow" cx="50%" cy="40%" r="45%">
      <stop offset="0%" stop-color="#fbbc00" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#fbbc00" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cbar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fbbc00"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="cglowf">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="cdots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#fbbc00" fill-opacity="0.07"/>
    </pattern>
  </defs>

  <rect width="800" height="384" fill="url(#cbg)"/>
  <rect width="800" height="384" fill="url(#cdots)"/>
  <rect width="800" height="384" fill="url(#cglow)"/>

  <!-- Header -->
  <text x="48" y="58" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" font-weight="700" letter-spacing="3" fill="#fbbc00">STT_BENCHMARK // 廣東話</text>
  <text x="48" y="80" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10" letter-spacing="2" fill="#9c8f78">5 PROVIDERS · LLM TRANSLATION · TTS ROUND-TRIP</text>

  <!-- Waveform -->
  <g transform="translate(48,128)" filter="url(#cglowf)">
