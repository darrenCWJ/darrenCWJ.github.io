    <text x="344" y="260" fill="#d9e2ff">11LABS</text>
    <rect x="452" y="251" width="197" height="9" rx="1" fill="url(#cbar)" opacity="0.6"/>
    <text x="708" y="260" fill="#fbbc00">0.74</text>

    <text x="344" y="290" fill="#d9e2ff">F-WHISPER</text>
    <rect x="452" y="281" width="186" height="9" rx="1" fill="url(#cbar)" opacity="0.5"/>
