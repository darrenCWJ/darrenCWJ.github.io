      <rect x="0"   y="20" width="5" height="24" rx="2" opacity="0.5"/>
      <rect x="11"  y="12" width="5" height="40" rx="2" opacity="0.7"/>
      <rect x="22"  y="2"  width="5" height="60" rx="2"/>
      <rect x="33"  y="16" width="5" height="32" rx="2" opacity="0.8"/>
      <rect x="44"  y="8"  width="5" height="48" rx="2" opacity="0.9"/>
      <rect x="55"  y="22" width="5" height="20" rx="2" opacity="0.5"/>
      <rect x="66"  y="4"  width="5" height="56" rx="2"/>
      <rect x="77"  y="14" width="5" height="36" rx="2" opacity="0.8"/>
      <rect x="88"  y="24" width="5" height="16" rx="2" opacity="0.4"/>
      <rect x="99"  y="10" width="5" height="44" rx="2" opacity="0.85"/>
      <rect x="110" y="18" width="5" height="28" rx="2" opacity="0.6"/>
      <rect x="121" y="26" width="5" height="12" rx="2" opacity="0.35"/>
    </g>
  </g>
  <text x="48" y="216" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="9" letter-spacing="2" fill="#6a7a98">INPUT_AUDIO // yue-Hant-HK</text>

  <!-- Provider comparison bars -->
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="10">
    <rect x="320" y="112" width="432" height="232" rx="6" fill="#0a1326" stroke="#fbbc00" stroke-opacity="0.22"/>
    <text x="344" y="140" font-size="9" letter-spacing="2" fill="#9c8f78">SAMPLE_RUN // RELATIVE_SCORE</text>

    <text x="344" y="170" fill="#d9e2ff">WHISPER</text>
    <rect x="452" y="161" width="248" height="9" rx="1" fill="url(#cbar)"/>
    <text x="708" y="170" fill="#fbbc00">0.91</text>

    <text x="344" y="200" fill="#d9e2ff">GOOGLE</text>
    <rect x="452" y="191" width="230" height="9" rx="1" fill="url(#cbar)" opacity="0.85"/>
    <text x="708" y="200" fill="#fbbc00">0.86</text>

    <text x="344" y="230" fill="#d9e2ff">TENCENT</text>
    <rect x="452" y="221" width="221" height="9" rx="1" fill="url(#cbar)" opacity="0.75"/>
