<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 384" width="800" height="384">
  <defs>
    <linearGradient id="mbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1629"/>
      <stop offset="60%" stop-color="#0c1530"/>
      <stop offset="100%" stop-color="#101b3e"/>
    </linearGradient>
    <radialGradient id="mglow" cx="35%" cy="45%" r="50%">
